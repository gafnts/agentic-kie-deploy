name: Deploy · Dev

on:
  push:
    branches: [develop]
    paths: ["infra/**", ".github/workflows/deploy-dev.yml"]
  pull_request:
    branches: [develop]
    paths: ["infra/**", ".github/workflows/deploy-dev.yml"]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  ENV: dev
  AWS_REGION: us-east-1
  TF_VERSION: 1.15.0

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend file
        run: make backend

      - run: terraform -chdir=infra fmt -check -recursive
      - run: make init ENV=${{ env.ENV }}

      - name: Plan
        id: plan
        run: make plan ENV=${{ env.ENV }} 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Capture plan output
        if: always()
        id: planfile
        run: |
          {
            echo 'plan<<EOF'
            head -c 60000 plan.txt
            echo
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan
        if: always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: terraform-plan-dev
          message: |
            #### Terraform Plan · `dev` ${{ steps.plan.outcome == 'success' && '✅' || '❌' }}
            <details><summary>Show plan</summary>

            ```
            ${{ steps.planfile.outputs.plan }}
            ```
            </details>

      - if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate backend file
        run: make backend

      - run: make init ENV=${{ env.ENV }}
      - run: terraform -chdir=infra apply -auto-approve -var-file=envs/${{ env.ENV }}.tfvars
